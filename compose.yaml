name: vine-watcher

services:
  watcher:
    image: ${VINE_WATCHER_IMAGE:-gabrielepennacchia/vine-watcher:latest}
    build:
      context: .
    restart: unless-stopped
    shm_size: 1gb
    mem_limit: ${VINE_WATCHER_MEMORY_LIMIT:-2g}
    pids_limit: ${VINE_WATCHER_PIDS_LIMIT:-256}
    stop_grace_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - path: ${VINE_WATCHER_ENV_FILE:-./.env}
        required: false
    environment:
      NODE_ENV: production
      HEADLESS: "false"
      CHROMIUM_NO_SANDBOX: "true"
      VINE_WATCHER_XVFB: "true"
      DATABASE_PATH: /data/vine-watcher.sqlite
      PLAYWRIGHT_USER_DATA_DIR: /data/chromium-profile
      HEALTH_SERVER_ENABLED: "true"
      HEALTH_SERVER_HOST: 0.0.0.0
    ports:
      - "${HEALTH_BIND:-127.0.0.1}:${HEALTH_SERVER_PORT:-8765}:${HEALTH_SERVER_PORT:-8765}"
    volumes:
      - vine-data:/data
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  login:
    image: ${VINE_WATCHER_IMAGE:-gabrielepennacchia/vine-watcher:latest}
    build:
      context: .
    profiles:
      - login
    shm_size: 1gb
    mem_limit: ${VINE_WATCHER_LOGIN_MEMORY_LIMIT:-2g}
    pids_limit: ${VINE_WATCHER_PIDS_LIMIT:-256}
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - path: ${VINE_WATCHER_ENV_FILE:-./.env}
        required: false
    environment:
      NODE_ENV: production
      HEADLESS: "false"
      CHROMIUM_NO_SANDBOX: "true"
      DATABASE_PATH: /data/vine-watcher.sqlite
      PLAYWRIGHT_USER_DATA_DIR: /data/chromium-profile
      DISPLAY_ID: ":99"
      LOGIN_WAIT_FILE: /tmp/vine-watcher-login/done
      NOVNC_PORT: "6080"
      NOVNC_PUBLIC_HOST: ${NOVNC_PUBLIC_HOST:-localhost}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
    ports:
      - "${NOVNC_BIND:-127.0.0.1}:${NOVNC_PORT:-6080}:6080"
    volumes:
      - vine-data:/data
    command: ["bash", "scripts/docker-login.sh"]

volumes:
  vine-data:
